<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG - Schicht B Report</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --apg-mavi: #78a2cc; 
            --apg-dark: #1a2a5e;    
            --wa-green: #25D366;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .card { width: 100%; max-width: 450px; background: #ffffff; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid var(--apg-dark); }
        .header { text-align: center; margin-bottom: 20px; }
        .company-name { color: var(--apg-dark); font-size: 22px; font-weight: 800; margin: 0; }
        .schicht-tag { color: var(--apg-mavi); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .section-title { font-size: 11px; text-transform: uppercase; font-weight: 800; color: #94a3b8; margin: 15px 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
        
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #334155; }
        select, input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #fbfcfd; font-family: inherit; }
        
        .worker-item, .stoerung-item { border-left: 4px solid var(--apg-mavi); padding-left: 10px; margin-bottom: 10px; background: #f8fafc; border-radius: 0 12px 12px 0; padding-top: 5px; }
        .other-name-input, .stoerung-sonstige-input { display: none; margin-top: -5px; border-style: dashed; }

        #formtraegerContainer { display: none; background: #f0f4f8; padding: 10px; border-radius: 12px; margin-bottom: 10px; border: 1px dashed var(--apg-mavi); }
        .artikel-item { background: #f1f5f9; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-secondary { background: #e2e8f0; color: #475569; border: none; padding: 10px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 15px; font-size: 13px; }
        .btn-add-art { background: var(--apg-dark); color: white; border: none; padding: 14px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 20px; font-size: 14px; }
        .btn-wa { background-color: var(--wa-green); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-camera { background-color: white; color: var(--apg-dark); border: 2px solid var(--apg-dark); padding: 12px; border-radius: 12px; font-weight: 700; margin-bottom: 10px; width: 100%; cursor: pointer; }
        #imgLabel { text-align: center; font-size: 12px; color: #16a34a; font-weight: 700; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <p class="company-name">ADLER PELZER GROUP</p>
        <span class="schicht-tag">Schicht-B Report</span>
    </div>

    <!-- PERSONAL -->
    <div class="section-title">Personal</div>
    <div id="workerContainer">
        <div class="worker-item">
            <select class="worker-select" onchange="checkOtherWorker(this)">
                <option value="">-- Name wählen --</option>
                <option>Aldirmaz P.- 577</option>
                <option>Anderwald R. - 509 E</option>
                <option>Bayrakli F. - 1377 E</option>
                <option>Kilic D. - 1384 E</option>
                <option>Maafi T.- 1273 E</option>
                <option>Besche T.- 1472</option>
                <option>Eickhoff P.-1406</option>
                <option>Toth, Renata-1699</option>
                <option>Gibba N.- 1367</option>
                <option>Helf A.- 1483</option>
                <option>Isbir J.-1715</option>
                <option>Jeyakumar S.-1698</option>
                <option>Kalisch T.- 1451</option>
                <option>Keskin Mur. 517</option>
                <option>Kowarsch R.-484</option>
                <option>Nowak M.-1390</option>
                <option>Pähler D.-1332</option>
                <option>Patarcsity V.-1700</option>
                <option>Pulendran K.- 1498</option>
                <option>Sahin E.-1721</option>
                <option>Savas S.- 1360</option>
                <option>Schiavitelli C.-1669</option>
                <option>Uluyüz B.- 1450</option>
                <option>Uzun S.-1433</option>
                <option>Klomrit, Thanin - 1070</option>
                <option>Garcia-Hervas, Francisco - 339</option>
                <option value="Sonstige">Sonstige (Name eingeben)</option>
            </select>
            <input type="text" class="other-name-input" placeholder="Vorname Nachname eingeben">
        </div>
    </div>
    <button class="btn-secondary" onclick="addWorkerField()">👤 Mitarbeiter hinzufügen</button>

    <!-- ANLAGE -->
    <div class="section-title">Anlage & Formträger</div>
    <select id="anlage" onchange="handleAnlageChange()">
        <option value="">-- Anlage wählen --</option>
        <option value="PUR1">PUR1</option><option value="PUR2">PUR2</option>
        <option value="PUR3">PUR3</option><option value="PUR4">PUR4</option>
        <option value="PUR5">PUR5</option><option value="PUR6">PUR6</option>
        <option value="PUR7">PUR7</option><option value="PUR8">PUR8</option>
        <option value="PUR9">PUR9</option>
        <option value="CIM1">CIM1</option>
        <option value="IM1">IM1</option><option value="IM2">IM2</option>
        <option value="IM3">IM3</option><option value="IM4">IM4</option>
        <option value="IM5">IM5</option>
    </select>

    <div id="formtraegerContainer">
        <label>Formträger (Erforderlich)</label>
        <select id="formtraegerSelect" onchange="checkMultipleFT(this)">
            <option value="">-- Formträger wählen --</option>
            <option value="1">1</option>
            <option value="2">2</option>
            <option value="3">3</option>
            <option value="4">4</option>
            <option value="5">5</option>
            <option value="6">6</option>
            <option value="Mehrere">Mehrere Formträger</option>
        </select>
        <input type="text" id="multipleFTInput" style="display:none; border-style: dashed;" placeholder="z.B. 1, 3, 5">
    </div>

    <!-- PRODUKTION -->
    <div class="section-title">Produktionsdaten</div>
    <div id="artikelContainer">
        <div class="artikel-item">
            <label>Artikelnummer</label>
            <input type="text" class="artikel-no" placeholder="z.B. 1023456">
            <div class="grid-2">
                <div><label>Gut-Teile</label><input type="number" class="gut-sayisi" placeholder="0" inputmode="numeric"></div>
                <div><label>Ausschuss</label><input type="number" class="aus-sayisi" placeholder="0" inputmode="numeric"></div>
            </div>
        </div>
    </div>
    <button class="btn-add-art" onclick="addArtikelField()">📦 Artikel hinzufügen</button>

    <!-- STÖRUNGEN -->
    <div class="section-title">Störungen</div>
    <div id="stoerungContainer">
        <!-- JS-Inhalt -->
    </div>
    <button class="btn-secondary" onclick="addStoerungField()">⚠️ Störung hinzufügen</button>
    
    <label>Notizen</label>
    <textarea id="notiz" rows="2" placeholder="Besonderheiten oder Anmerkungen..."></textarea>

    <div id="imgLabel">📸 Foto aufgenommen</div>
    <input type="file" id="camera" accept="image/*" capture="environment" style="display:none" onchange="updateImgStatus()">
    <button class="btn-camera" onclick="document.getElementById('camera').click()">📸 FOTO AUFNEHMEN</button>

    <button class="btn-wa" onclick="generateReport()">BERICHT PER WHATSAPP SENDEN</button>
</div>

<script>
    // FEHLERCZODES LISTE (PUR)
    const purErrors = {
        "4-2-01": "Ungepl. Instandhaltung an der Werkzeug",
        "4-2-02": "Ungepl. Instandhaltung an der Maschine",
        "4-2-03": "POLY /SO Überdrück",
        "4-2-04": "Mischkopf n.i.o. (undicht etc.)",
        "4-2-05": "Fehler Lichtschranke",
        "4-2-06": "Trennmittelpistole verstopft/defekt",
        "4-2-07": "Formträger öffnet nicht/schließt nicht",
        "4-2-08": "Reinigung des Werkzeugs",
        "4-2-09": "Not Aus",
        "5-2-01": "Keine Halbfertigteile bereitgestellt (Logistik)",
        "5-2-02": "Keine Halbfertigteile von IM/CIM Anlage",
        "5-2-03": "Anlernen / angelernt werden von Mitarbeiter",
        "5-2-04": "Keine Produktion aufgrund von Wartezeit",
        "5-2-05": "Mitarbeiter Umbesetzung (Anlage steht)",
        "5-2-06": "Unterbesetzung (Performance Verluste)",
        "5-2-07": "Scanner nicht am Arbeitsplatz / Drucker Probleme",
        "5-2-08": "Kein Leergut bereitgestellt",
        "5-2-09": "Gasflasche wechseln",
        "Sonstige": "Sonstige (Bitte Grund angeben)"
    };

    const workerOptions = `
        <option value="">-- Name wählen --</option>
        <option>Aldirmaz P.- 577</option><option>Anderwald R. - 509 E</option>
        <option>Bayrakli F. - 1377 E</option><option>Kilic D. - 1384 E</option>
        <option>Maafi T.- 1273 E</option><option>Besche T.- 1472</option>
        <option>Eickhoff P.-1406</option><option>Toth, Renata-1699</option>
        <option>Gibba N.- 1367</option><option>Helf A.- 1483</option>
        <option>Isbir J.-1715</option><option>Jeyakumar S.-1698</option>
        <option>Kalisch T.- 1451</option><option>Keskin Mur. 517</option>
        <option>Kowarsch R.-484</option><option>Nowak M.-1390</option>
        <option>Pähler D.-1332</option><option>Patarcsity V.-1700</option>
        <option>Pulendran K.- 1498</option><option>Sahin E.-1721</option>
        <option>Savas S.- 1360</option><option>Schiavitelli C.-1669</option>
        <option>Uluyüz B.- 1450</option><option>Uzun S.-1433</option>
        <option>Klomrit, Thanin - 1070</option>
        <option>Garcia-Hervas, Francisco - 339</option>
        <option value="Sonstige">Sonstige (Name eingeben)</option>
    `;

    function handleAnlageChange() {
        const anlageSelect = document.getElementById("anlage");
        const ftContainer = document.getElementById("formtraegerContainer");
        ftContainer.style.display = anlageSelect.value.startsWith("PUR") ? "block" : "none";
        
        document.getElementById("stoerungContainer").innerHTML = "";
        if (anlageSelect.value !== "") {
            addStoerungField();
        }
    }

    function addStoerungField() {
        const anlage = document.getElementById("anlage").value;
        const container = document.getElementById("stoerungContainer");
        
        if (anlage === "") {
            alert("Bitte zuerst eine Anlage auswählen!");
            return;
        }

        const div = document.createElement("div");
        div.className = "stoerung-item";
        
        if (anlage.startsWith("PUR")) {
            let opts = '<option value="">-- Fehler wählen --</option>';
            for (let code in purErrors) {
                opts += `<option value="${code}">${code} - ${purErrors[code]}</option>`;
            }
            div.innerHTML = `<div class="grid-2">
                <div>
                    <select class="stoerung-grund-select" onchange="checkSonstigeError(this)">${opts}</select>
                    <input type="text" class="stoerung-sonstige-input" placeholder="Beschreibung eingeben">
                </div>
                <div><input type="number" class="stoerung-dauer" placeholder="Dauer (Min)" inputmode="numeric"></div>
            </div>`;
        } else {
            div.innerHTML = `<div class="grid-2">
                <div><input type="text" class="stoerung-grund-manual" placeholder="Grund der Störung"></div>
                <div><input type="number" class="stoerung-dauer" placeholder="Dauer (Min)" inputmode="numeric"></div>
            </div>`;
        }
        container.appendChild(div);
    }

    function checkSonstigeError(select) {
        select.nextElementSibling.style.display = (select.value === "Sonstige") ? "block" : "none";
    }

    function checkOtherWorker(select) {
        select.nextElementSibling.style.display = (select.value === "Sonstige") ? "block" : "none";
    }

    function checkMultipleFT(select) {
        document.getElementById("multipleFTInput").style.display = (select.value === "Mehrere") ? "block" : "none";
    }

    function addWorkerField() {
        const div = document.createElement("div");
        div.className = "worker-item";
        div.innerHTML = `<select class="worker-select" onchange="checkOtherWorker(this)">${workerOptions}</select>
                        <input type="text" class="other-name-input" placeholder="Name manuell eingeben">`;
        document.getElementById("workerContainer").appendChild(div);
    }

    function addArtikelField() {
        const div = document.createElement("div");
        div.className = "artikel-item";
        div.innerHTML = `<label>Artikelnummer</label><input type="text" class="artikel-no" placeholder="z.B. 1023456">
            <div class="grid-2">
                <div><label>Gut-Teile</label><input type="number" class="gut-sayisi" placeholder="0" inputmode="numeric"></div>
                <div><label>Ausschuss</label><input type="number" class="aus-sayisi" placeholder="0" inputmode="numeric"></div>
            </div>`;
        document.getElementById("artikelContainer").appendChild(div);
    }

    function updateImgStatus() {
        if(document.getElementById("camera").files.length > 0) document.getElementById("imgLabel").style.display = "block";
    }

    function generateReport() {
        const phone = "4917623638794";
        const anlage = document.getElementById("anlage").value;
        const ftSelect = document.getElementById("formtraegerSelect").value;
        const ftInput = document.getElementById("multipleFTInput").value;
        let finalFT = (ftSelect === "Mehrere") ? ftInput : ftSelect;

        let workers = [];
        document.querySelectorAll(".worker-item").forEach(item => {
            const s = item.querySelector(".worker-select");
            const o = item.querySelector(".other-name-input");
            if (s.value === "Sonstige" && o.value) workers.push(o.value + " (S)");
            else if (s.value && s.value !== "Sonstige") workers.push(s.value);
        });

        let artikelText = "";
        document.querySelectorAll(".artikel-item").forEach((node, i) => {
            const no = node.querySelector(".artikel-no").value || "---";
            const gut = node.querySelector(".gut-sayisi").value || "0";
            const aus = node.querySelector(".aus-sayisi").value || "0";
            artikelText += `📦 *Art ${i+1}:* ${no} | ✅ Gut: ${gut} | 🗑️ Aus: ${aus}\n`;
        });

        let stoerungText = "";
        document.querySelectorAll(".stoerung-item").forEach((node, i) => {
            let grund = "";
            const dauer = node.querySelector(".stoerung-dauer").value || "0";
            if (anlage.startsWith("PUR")) {
                const sel = node.querySelector(".stoerung-grund-select");
                if (sel.value === "Sonstige") {
                    grund = node.querySelector(".stoerung-sonstige-input").value || "Sonstige";
                } else {
                    grund = sel.value; 
                }
            } else {
                grund = node.querySelector(".stoerung-grund-manual").value;
            }
            if(grund) stoerungText += `⚠️ *Fehler ${i+1}:* ${grund} (${String(dauer)} Min)\n`;
        });

        const text = `📊 *APG BERICHT - SCHICHT B*\n` +
                     `📅 *Datum/Zeit:* ${new Date().toLocaleString('de-DE')}\n` +
                     `👤 *Personal:* ${workers.join(", ")}\n` +
                     `🏗️ *Anlage:* ${anlage}${finalFT ? ' (FT: ' + finalFT + ')' : ''}\n` +
                     `--------------------------\n` +
                     artikelText +
                     `--------------------------\n` +
                     (stoerungText || "⚠️ *Störungen:* Keine\n") +
                     `📝 *Notiz:* ${document.getElementById("notiz").value || "Keine"}`;

        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
    }
</script>

</body>
</html>
