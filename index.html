<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schicht B</title>

<style>
body { font-family: Arial; padding:20px; background:#f5f5f5; }
input, select { margin:5px 0; padding:10px; width:100%; font-size:16px; }
button { padding:12px; width:100%; background:#25D366; color:white; border:none; font-size:16px; }
</style>
</head>

<body>

<h2>Schicht B Formular</h2>

<input id="name" placeholder="Mitarbeiter Name">

<select id="anlage">
<option>PUR1</option>
<option>PUR2</option>
<option>PUR3</option>
<option>PUR4</option>
<option>PUR5</option>
<option>IM1</option>
<option>IM2</option>
<option>CIM1</option>
</select>

<input id="artikel" placeholder="Artikelnummer">
<input id="gut" type="number" placeholder="Gutteile">
<input id="ausschuss" type="number" placeholder="Ausschuss">
<input id="storung" placeholder="Störung">

<button onclick="gonderWhatsApp()">WhatsApp senden</button>

<script>
function gonderWhatsApp() {

let name = document.getElementById("name").value;
let anlage = document.getElementById("anlage").value;
let artikel = document.getElementById("artikel").value;
let gut = document.getElementById("gut").value;
let ausschuss = document.getElementById("ausschuss").value;
let storung = document.getElementById("storung").value;

if (!name || !gut) {
    alert("Bitte Name und Gutteile eingeben!");
    return;
}

let now = new Date();
let tarih = now.toLocaleDateString();
let saat = now.toLocaleTimeString();

let mesaj = `MITARBEITER: ${name}
ANLAGE: ${anlage}
ARTIKEL: ${artikel}
GUT: ${gut}
AUSSCHUSS: ${ausschuss}
STOERUNG: ${storung}
DATUM: ${tarih} ${saat}`;

// 🔥 iPhone + GitHub uyumlu
let url = "https://api.whatsapp.com/send?phone=4917623638794&text=" + encodeURIComponent(mesaj);

window.open(url, "_blank");
}
</script>

</body>
</html>
