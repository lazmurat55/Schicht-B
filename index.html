<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Schicht B - Produktionsbericht</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --alacati-mavi: #78a2cc; /* Alacatı Mavisi Tonu */
            --apg-dark: #1a2a5e;    /* Koyu lacivert (detaylar için) */
            --wa-green: #25D366;
            --bg: #f1f5f9;
            --card: #ffffff;
            --text: #1e293b;
            --border: #cbd5e1;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text);
            margin: 0;
            padding: 15px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 500px;
            background: var(--card);
            padding: 25px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.1);
        }

        .company-header {
            text-align: center;
            margin-bottom: 5px;
        }

        .company-name {
            color: var(--alacati-mavi); /* Alacatı Mavisi Uygulandı */
            font-size: 28px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: -0.5px;
            margin: 0;
            text-shadow: 1px 1px 0px rgba(0,0,0,0.05); /* Hafif derinlik */
        }

        h2 {
            text-align: center;
            margin-top: 0;
            margin-bottom: 25px;
            color: var(--apg-dark);
            font-weight: 600;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 2px;
            opacity: 0.7;
        }

        .section-label {
            font-size: 11px;
            text-transform: uppercase;
            font-weight: 700;
            color: #64748b;
            margin: 20px 0 10px 0;
            border-bottom: 1px solid #e2e8f0;
            padding-bottom: 5px;
        }

        label {
            display: block;
            font-weight: 600;
            margin-bottom: 5px;
            font-size: 14px;
        }

        select, input, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 15px;
            border: 1.5px solid var(--border);
            border-radius: 8px;
            font-size: 15px;
            box-sizing: border-box;
            background: #fff;
        }

        input:focus, select:focus {
            outline: none;
            border-color: var(--alacati-mavi);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 10px;
        }

        .btn-group {
            margin-top: 10px;
            display: flex;
            flex-direction: column;
            gap: 10px;
        }

        button {
            width: 100%;
            padding: 15px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 700;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            transition: all 0.2s ease;
        }

        .btn-wa {
            background-color: var(--wa-green);
            color: white;
        }

        .btn-img {
            background-color: #fff;
            color: var(--apg-dark);
            border: 2px solid var(--apg-dark);
        }

        button:active {
            transform: scale(0.98);
            opacity: 0.8;
        }
    </style>
</head>
<body>

<div class="container">
    <div class="company-header">
        <p class="company-name">ADLER PELZER GROUP</p>
    </div>
    
    <h2>Schicht-B</h2>

    <!-- Formun geri kalanı aynı şekilde devam ediyor... -->
    <div class="section-label">Personal & Anlage</div>
    
    <label>Mitarbeiter</label>
    <select id="worker" onchange="checkWorker()">
        <option value="">-- Bitte wählen --</option>
        <option>Aldirmaz P. - 577</option>
        <option>Anderwald R. - 509 E</option>
        <option>Bayrakli F. - 1377 E</option>
        <option>Kilic D. - 1384 E</option>
        <option>Maafi T. - 1273 E</option>
        <option>Besche T. - 1472</option>
        <option>Eickhoff P. - 1406</option>
        <option>Toth, Renata - 1699</option>
        <option>Gibba N. - 1367</option>
        <option>Helf A. - 1483</option>
        <option>Isbir J. - 1715</option>
        <option>Jeyakumar S. - 1698</option>
        <option>Kalisch T. - 1451</option>
        <option>Keskin Mur. - 517</option>
        <option>Kowarsch R. - 484</option>
        <option>Nowak M. - 1390</option>
        <option>Pähler D. - 1332</option>
        <option>Patarcsity V. - 1700</option>
        <option>Pulendran K. - 1498</option>
        <option>Sahin E. - 1721</option>
        <option>Savas S. - 1360</option>
        <option>Schiavitelli C. - 1669</option>
        <option>Uluyüz B. - 1450</option>
        <option>Uzun S. - 1433</option>
        <option>Klomrit, Thanin - 1070</option>
        <option>Garcia-Hervas, Francisco - 339</option>
        <option value="other">Andere...</option>
    </select>
    <input type="text" id="customName" style="display:none;" placeholder="Name hier eingeben">

    <label>Anlage</label>
    <select id="anlage">
        <option value="">-- Bitte wählen --</option>
        <option>PUR1</option><option>PUR2</option><option>PUR3</option>
        <option>PUR4</option><option>PUR5</option><option>PUR6</option>
        <option>PUR7</option><option>PUR8</option><option>PUR9</option>
        <option>CIM1</option><option>IM1</option><option>IM2</option>
        <option>IM3</option><option>IM4</option><option>IM5</option>
    </select>

    <div class="section-label">Produktion</div>
    
    <label>Artikel 1</label>
    <input type="text" id="artikel1" placeholder="Artikelnummer">
    <div class="grid">
        <input type="number" id="gut1" placeholder="Gutteile">
        <input type="number" id="aus1" placeholder="Ausschuss">
    </div>

    <div class="section-label">Störungen & Info</div>
    
    <div class="grid">
        <input type="text" id="stoerung" placeholder="Störung">
        <input type="number" id="stoerungMin" placeholder="Minuten">
    </div>
    <textarea id="notiz" rows="2" placeholder="Notizen..."></textarea>

    <div class="btn-group">
        <button class="btn-wa" onclick="sendWhatsApp()">
            WhatsApp senden
        </button>
        <input type="file" id="cameraInput" accept="image/*" capture="environment" style="display: none;">
        <button class="btn-img" onclick="document.getElementById('cameraInput').click()">
            Foto aufnehmen
        </button>
    </div>
</div>

<script>
    function checkWorker() {
        var selection = document.getElementById("worker").value;
        var customInput = document.getElementById("customName");
        customInput.style.display = (selection === "other") ? "block" : "none";
    }

    function sendWhatsApp() {
        var worker = document.getElementById("worker").value;
        if (worker === "other") worker = document.getElementById("customName").value;
        var anlage = document.getElementById("anlage").value;
        
        if (!worker || !anlage) {
            alert("Mitarbeiter und Anlage fehlen!");
            return;
        }

        var text = "*APG - SCHICHT B BERICHT*\n" +
                   "--------------------------\n" +
                   "*Mitarbeiter:* " + worker + "\n" +
                   "*Anlage:* " + anlage + "\n" +
                   "*Artikel:* " + document.getElementById("artikel1").value + "\n" +
                   "*Gut:* " + (document.getElementById("gut1").value || 0) + "\n" +
                   "*Fire:* " + (document.getElementById("aus1").value || 0) + "\n" +
                   "*Störung:* " + (document.getElementById("stoerung").value || "Keine") + " (" + (document.getElementById("stoerungMin").value || 0) + " min)";

        window.open("https://wa.me/?text=" + encodeURIComponent(text));
    }
</script>
</body>
</html>
