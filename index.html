<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>APG - Schicht B Raporu</title>
    
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --apg-mavi: #78a2cc; 
            --apg-dark: #1a2a5e;    
            --wa-green: #25D366;
            --bg: #f8fafc;
            --border: #e2e8f0;
        }

        body { font-family: 'Inter', sans-serif; background-color: var(--bg); margin: 0; padding: 15px; display: flex; justify-content: center; min-height: 100vh; }
        .card { width: 100%; max-width: 450px; background: #ffffff; border-radius: 24px; padding: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.08); border-top: 6px solid var(--apg-dark); }
        .header { text-align: center; margin-bottom: 20px; }
        .company-name { color: var(--apg-dark); font-size: 22px; font-weight: 800; margin: 0; }
        .schicht-tag { color: var(--apg-mavi); font-size: 14px; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; }
        .section-title { font-size: 11px; text-transform: uppercase; font-weight: 800; color: #94a3b8; margin: 15px 0 10px 0; display: flex; align-items: center; gap: 8px; }
        .section-title::after { content: ""; flex: 1; height: 1px; background: #e2e8f0; }
        
        label { display: block; font-weight: 600; font-size: 13px; margin-bottom: 4px; color: #334155; }
        select, input, textarea { width: 100%; padding: 12px; margin-bottom: 10px; border: 2px solid var(--border); border-radius: 12px; font-size: 16px; box-sizing: border-box; background: #fbfcfd; font-family: inherit; }
        
        .worker-item { border-left: 4px solid var(--apg-mavi); padding-left: 10px; margin-bottom: 10px; }
        .artikel-item { background: #f1f5f9; padding: 15px; border-radius: 16px; margin-bottom: 15px; border: 1px solid #e2e8f0; }
        
        .grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        
        .btn-secondary { background: #e2e8f0; color: #475569; border: none; padding: 8px; border-radius: 10px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 15px; font-size: 12px; }
        .btn-add-art { background: var(--apg-dark); color: white; border: none; padding: 12px; border-radius: 12px; font-weight: 700; cursor: pointer; width: 100%; margin-bottom: 20px; }
        
        .btn-wa { background-color: var(--wa-green); color: white; border: none; padding: 18px; border-radius: 14px; font-size: 16px; font-weight: 800; cursor: pointer; width: 100%; display: flex; align-items: center; justify-content: center; gap: 10px; margin-top: 10px; }
        .btn-camera { background-color: white; color: var(--apg-dark); border: 2px solid var(--apg-dark); padding: 12px; border-radius: 12px; font-weight: 700; margin-bottom: 10px; width: 100%; cursor: pointer; }
        #imgLabel { text-align: center; font-size: 12px; color: #16a34a; font-weight: 700; display: none; margin-bottom: 10px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <p class="company-name">ADLER PELZER GROUP</p>
        <span class="schicht-tag">Schicht-B Report</span>
    </div>

    <!-- PERSONEL BÖLÜMÜ -->
    <div class="section-title">Personal</div>
    <div id="workerContainer">
        <div class="worker-item">
            <select class="worker-select">
                <option value="">-- Name wählen --</option>
                <option>Aldirmaz P. - 577</option>
                <option>Anderwald R. - 509 E</option>
                <option>Bayrakli F. - 1377 E</option>
                <option>Besche T. - 1472</option>
                <option>Keskin Mur. - 517</option>
                <option>Uluyüz B. - 1450</option>
            </select>
        </div>
    </div>
    <button class="btn-secondary" onclick="addWorkerField()">👤 + Başka Personel Ekle</button>

    <div class="section-title">Anlage</div>
    <select id="anlage">
        <option value="">-- Anlage wählen --</option>
        <option>PUR1</option><option>PUR2</option><option>PUR3</option>
        <option>PUR4</option><option>PUR5</option><option>CIM1</option>
        <option>IM1</option><option>IM2</option>
    </select>

    <!-- ÜRETİM BÖLÜMÜ -->
    <div class="section-title">Produktionsdaten</div>
    <div id="artikelContainer">
        <div class="artikel-item">
            <label>Artikelnummer</label>
            <input type="text" class="artikel-no" placeholder="z.B. 1023456">
            <div class="grid-2">
                <div>
                    <label>Gut-Teile</label>
                    <input type="number" class="gut-sayisi" placeholder="0" inputmode="numeric">
                </div>
                <div>
                    <label>Ausschuss</label>
                    <input type="number" class="aus-sayisi" placeholder="0" inputmode="numeric">
                </div>
            </div>
        </div>
    </div>
    <button class="btn-add-art" onclick="addArtikelField()">📦 + Başka Artikel Ekle</button>

    <!-- ARIZA VE NOTLAR -->
    <div class="section-title">Störungen & Info</div>
    <div class="grid-2">
        <div>
            <label>Störungsgrund</label>
            <input type="text" id="stoerung" placeholder="Grund">
        </div>
        <div>
            <label>Dauer (Min)</label>
            <input type="number" id="dauer" placeholder="0" inputmode="numeric">
        </div>
    </div>
    
    <label>Notizen</label>
    <textarea id="notiz" rows="2" placeholder="Besonderheiten..."></textarea>

    <div id="imgLabel">📸 Foto aufgenommen</div>
    <input type="file" id="camera" accept="image/*" capture="environment" style="display:none" onchange="updateImgStatus()">
    <button class="btn-camera" onclick="document.getElementById('camera').click()">📸 FOTO AUFNEHMEN</button>

    <button class="btn-wa" onclick="generateReport()">
        BERICHT PER WHATSAPP SENDEN
    </button>
</div>

<script>
    // Yeni Personel Alanı Ekle
    function addWorkerField() {
        const container = document.getElementById("workerContainer");
        const div = document.createElement("div");
        div.className = "worker-item";
        div.innerHTML = container.querySelector(".worker-item").innerHTML;
        container.appendChild(div);
    }

    // Yeni Artikel Alanı Ekle
    function addArtikelField() {
        const container = document.getElementById("artikelContainer");
        const div = document.createElement("div");
        div.className = "artikel-item";
        div.innerHTML = `
            <label>Artikelnummer</label>
            <input type="text" class="artikel-no" placeholder="z.B. 1023456">
            <div class="grid-2">
                <div>
                    <label>Gut-Teile</label>
                    <input type="number" class="gut-sayisi" placeholder="0" inputmode="numeric">
                </div>
                <div>
                    <label>Ausschuss</label>
                    <input type="number" class="aus-sayisi" placeholder="0" inputmode="numeric">
                </div>
            </div>`;
        container.appendChild(div);
    }

    function updateImgStatus() {
        if(document.getElementById("camera").files.length > 0) {
            document.getElementById("imgLabel").style.display = "block";
        }
    }

    function generateReport() {
        const phone = "905366455131";
        
        // Personelleri Topla
        const workerSelects = document.querySelectorAll(".worker-select");
        let workers = [];
        workerSelects.forEach(s => { if(s.value) workers.push(s.value); });
        
        const anlage = document.getElementById("anlage").value;
        if(workers.length === 0 || !anlage) {
            alert("❌ Name und Anlage wählen!");
            return;
        }

        // Artikelleri Topla
        const artikelNodes = document.querySelectorAll(".artikel-item");
        let artikelText = "";
        artikelNodes.forEach((node, i) => {
            const no = node.querySelector(".artikel-no").value || "---";
            const gut = node.querySelector(".gut-sayisi").value || "0";
            const aus = node.querySelector(".aus-sayisi").value || "0";
            artikelText += `📦 *Art ${i+1}:* ${no} | ✅ ${gut} | 🗑️ ${aus}\n`;
        });

        const stoer = document.getElementById("stoerung").value || "Keine";
        const dauer = document.getElementById("dauer").value || "0";
        const notiz = document.getElementById("notiz").value || "Keine";
        const hasImg = document.getElementById("camera").files.length > 0 ? "✅ JA" : "❌ NEIN";

        const now = new Date();
        const time = now.toLocaleDateString('de-DE') + " " + now.toLocaleTimeString('de-DE', {hour: '2-digit', minute:'2-digit'});

        const text = `📊 *APG BERICHT - SCHICHT B*\n` +
                     `📅 *Zeit:* ${time}\n` +
                     `👤 *Mitarbeiter:* ${workers.join(", ")}\n` +
                     `🏗️ *Anlage:* ${anlage}\n` +
                     `--------------------------\n` +
                     artikelText +
                     `--------------------------\n` +
                     `⚠️ *Störung:* ${stoer} (${dauer} min)\n` +
                     `📝 *Notiz:* ${notiz}\n` +
                     `📸 *Foto:* ${hasImg}`;

        window.open(`https://wa.me/${phone}?text=${encodeURIComponent(text)}`, '_blank');
    }
</script>

</body>
</html>
