<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schicht B</title>
<style>
body {font-family: Arial; padding:20px; background:#f5f5f5;}
input, select, textarea, button {width:100%; padding:10px; margin-top:10px;}
button {background:#25D366; color:white; border:none;}
</style>
</head>
<body>

<h2>Schicht B Eingabe</h2>

<input type="text" id="worker" placeholder="Mitarbeiter Name">

<input type="text" id="anlage" placeholder="Anlage">
<input type="text" id="artikel" placeholder="Artikelnummer">
<input type="number" id="gutteile" placeholder="Gutteile">
<input type="number" id="ausschuss" placeholder="Ausschuss">

<input type="text" id="stoerung" placeholder="Störung">
<input type="number" id="dauer" placeholder="Minuten">

<textarea id="notiz" placeholder="Not"></textarea>

<button onclick="sendWhatsApp()">WhatsApp senden</button>

<script>
function sendWhatsApp(){

const text =
`MITARBEITER: ${worker.value}
ANLAGE: ${anlage.value}
ARTIKEL: ${artikel.value}
GUT: ${gutteile.value}
AUSSCHUSS: ${ausschuss.value}
STOERUNG: ${stoerung.value}
DAUER: ${dauer.value}
NOT: ${notiz.value}`;

const url = "https://api.whatsapp.com/send?text=" + encodeURIComponent(text);

window.open(url, "_blank");
}
</script>

</body>
</html>
