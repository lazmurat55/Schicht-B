<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Produktionsbericht - Schicht B</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary-color: #25D366;
            --primary-hover: #128C7E;
            --secondary-color: #34b7f1;
            --bg-color: #f4f7f9;
            --text-color: #334155;
            --border-color: #e2e8f0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
        }

        .container {
            max-width: 550px;
            margin: 20px auto;
            background: white;
            padding: 32px;
            border-radius: 16px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.05);
        }

        .header {
            text-align: center;
            margin-bottom: 30px;
        }

        .header h2 {
            margin: 0;
            font-weight: 600;
            color: #1e293b;
            letter-spacing: -0.5px;
        }

        .header p {
            color: #64748b;
            font-size: 14px;
            margin-top: 5px;
        }

        section {
            margin-bottom: 24px;
            padding-bottom: 20px;
            border-bottom: 1px solid var(--border-color);
        }

        section:last-of-type { border-bottom: none; }

        label {
            font-weight: 500;
            font-size: 14px;
            margin-bottom: 8px;
            display: block;
            color: #475569;
        }

        input, select, textarea {
            width: 100%;
            padding: 12px;
            margin-bottom: 16px;
            border-radius: 8px;
            border: 1px solid var(--border-color);
            font-size: 15px;
            box-sizing: border-box;
            transition: all 0.2s;
            background-color: #f8fafc;
        }

        input:focus, select:focus, textarea:focus {
            outline: none;
            border-color: var(--primary-color);
            background-color: #fff;
            box-shadow: 0 0 0 3px rgba(37, 211, 102, 0.1);
        }

        .grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .section-title {
            font-size: 12px;
            text-transform: uppercase;
            letter-spacing: 1px;
            color: #94a3b8;
            margin-bottom: 15px;
            font-weight: 600;
        }

        .button-group {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-top: 20px;
        }

        button {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 10px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .btn-whatsapp {
            background: var(--primary-color);
            color: white;
        }

        .btn-whatsapp:hover {
            background: var(--primary-hover);
        }

        .btn-photo {
            background: #fff;
            color: var(--secondary-color);
            border: 2px solid var(--secondary-color);
        }

        .btn-photo:hover {
            background: #f0f9ff;
        }

        button:active {
            transform: scale(0.98);
        }

        #fileInput {
            display: none;
        }

        .photo-hint {
            font-size: 12px;
            color: #64748b;
            text-align: center;
            margin-top: 5px;
        }
    </style>
</head>
