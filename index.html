<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Schicht B</title>

<style>
body {
  font-family: Arial, sans-serif;
  background: #eef1f5;
  margin: 0;
}

.container {
  max-width: 650px;
  margin: 30px auto;
  background: white;
  padding: 25px;
  border-radius: 12px;
  box-shadow: 0 5px 15px rgba(0,0,0,0.1);
}

h2 {
  text-align: center;
  margin-bottom: 20px;
}

label {
  font-weight: bold;
  margin-top: 10px;
  display: block;
}

input, select, textarea {
  width: 100%;
  padding: 10px;
  margin-top: 6px;
  margin-bottom: 12px;
  border-radius: 6px;
  border: 1px solid #ccc;
  font-size: 15px;
}

.grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 10px;
}

button {
  width: 100%;
  padding: 12px;
  background: #25D366;
  color: white;
  border: none;
  border-radius: 8px;
  font-size: 16px;
  cursor: pointer;
}

button:hover {
  background: #1ebe5d;
}
</style>
</head>

<body>

<div class="container">

<h2>Schicht B Eingabe</h2>

<label>Mitarbeiter:</label>
<select id="worker" onchange="checkWorker()">
  <option value="">-- auswählen --</option>
  <option>Aldirmaz P. - 577</option>
  <option>Anderwald R. - 509 E</option>
  <option>Bayrakli F. - 1377 E</option>
  <option>Kilic D. - 1384 E</option>
  <option>Maafi T. - 1273 E</option>
  <option>Besche T. - 1472</option>
  <option>Eickhoff P. - 1406</option>
  <option>Toth, Renata - 1699</option>
  <option>Gibba N. - 1367</option>
  <option>Helf A. - 1483</option>
  <option>Isbir J. - 1715</option>
  <option>Jeyakumar S. - 1698</option>
  <option>Kalisch T. - 1451</option>
  <option>Keskin Mur. - 517</option>
  <option>Kowarsch R. - 484</option>
  <option>Nowak M. - 1390</option>
  <option>Pähler D. - 1332</option>
  <option>Patarcsity V. - 1700</option>
  <option>Pulendran K. - 1498</option>
  <option>Sahin E. - 1721</option>
  <option>Savas S. - 1360</option>
  <option>Schiavitelli C. - 1669</option>
  <option>Uluyüz B. - 1450</option>
  <option>Uzun S. - 1433</option>
  <option>Klomrit, Thanin - 1070</option>
  <option>Garcia-Hervas, Francisco - 339</option>
  <option value="other">Andere...</option>
</select>

<input type="text" id="customName" placeholder="Name eingeben" style="display:none;">

<!-- ANLAGE DROPDOWN -->
<label>Anlage</label>
<select id="anlage">
  <option value="">-- auswählen --</option>
  <option>PUR1</option>
  <option>PUR2</option>
  <option>PUR3</option>
  <option>PUR4</option>
  <option>PUR5</option>
  <option>PUR6</option>
  <option>PUR7</option>
  <option>PUR8</option>
  <option>PUR9</option>
  <option>CIM1</option>
  <option>IM1</option>
  <option>IM2</option>
  <option>IM3</option>
  <option>IM4</option>
  <option>IM5</option>
</select>

<!-- ARTIKEL 1 -->
<label>Artikel 1</label>
<div class="grid">
  <input type="text" id="artikel1" placeholder="Artikelnummer">
  <input type="number" id="gut1" placeholder="Gutteile">
</div>
<input type="number" id="aus1" placeholder="Ausschuss">

<!-- ARTIKEL 2 -->
<label>Artikel 2 (optional)</label>
<div class="grid">
  <input type="text" id="artikel2" placeholder="Artikelnummer">
  <input type="number" id="gut2" placeholder="Gutteile">
</div>
<input type="number" id="aus2" placeholder="Ausschuss">

<!-- STÖRUNG -->
<div class="grid">
  <input type="text" id="stoerung" placeholder="Störung">
  <input type="number" id="stoerungMin" placeholder="Minuten">
</div>

<textarea id="notiz" placeholder="Not / Zusatzinfo"></textarea>

<button onclick="sendWhatsApp()">WhatsApp senden</button>

</div>

<script>

function checkWorker() {
  const worker = document.getElementById("worker").value;
  const custom = document.getElementById("customName");
  custom.style.display = worker === "other" ? "block" : "none";
}

function sendWhatsApp() {

  let worker = document.getElementById("worker").value;
  const custom = document.getElementById("customName").value;

  if (worker === "other") {
    worker = custom;
  }

  const anlage = document.getElementById("anlage").value;

  const artikel1 = document.getElementById("artikel1").value;
  const gut1 = document.getElementById("gut1").value;
  const aus1 = document.getElementById("aus1").value;

  const artikel2 = document.getElementById("artikel2").value;
  const gut2 = document.getElementById("gut2").value;
  const aus2 = document.getElementById("aus2").value;

  const stoerung = document.getElementById("stoerung").value;
  const stoerungMin = document.getElementById("stoerungMin").value;
  const notiz = document.getElementById("notiz").value;

  let artikelText =
`Artikel 1: ${artikel1}
Gutteile: ${gut1}
Ausschuss: ${aus1}`;

  if (artikel2) {
    artikelText += `

Artikel 2: ${artikel2}
Gutteile: ${gut2}
Ausschuss: ${aus2}`;
  }

  const text =
`Schicht B
Mitarbeiter: ${worker}
Anlage: ${anlage}

${artikelText}

Störung: ${stoerung} (${stoerungMin} min)
Not: ${notiz}`;

  const url = "https://wa.me/?text=" + encodeURIComponent(text);
  window.location.href = url;
}

</script>

</body>
</html>
